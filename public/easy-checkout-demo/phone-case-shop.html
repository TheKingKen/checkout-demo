<!-- public/phone-case-shop.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Easy Checkout Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="../../style.css">
</head>
<body>
<div class="checkout-container">
    <header>
        <h1>Easy Checkout Demo</h1>
        <img src="https://cdn.builtin.com/cdn-cgi/image/f=auto,fit=contain,w=200,h=200,q=100/sites/www.builtin.com/files/2026-01/Logo_Symbol_Full%20Colour.png" alt="CKO Logo"/>
        <!-- <img src="/merchant-logo.png"
             alt="iPhone case" class="product-image"/> -->
    </header>
    <section class="order-summary">
        <h2>Order Summary</h2>
        <div class="product-details">
            <input type="text" id="product-name" class="product-name" value="Classic iPhone Case" placeholder="Enter product name" style="width: 100%;">
            <div class="custom-price-section" style="margin-top: 15px; width: 100%;">
                <label style="display: block; margin-bottom: 8px;"><strong>Set price:</strong></label>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="custom-currency" placeholder="e.g. HKD" style="width: 80px;" maxlength="3" required>
                    <input type="number" id="custom-amount" placeholder="e.g. 99.99" style="flex: 1;" min="0" step="0.01" required>
                </div>
            </div>
        </div>
        <textarea id="product-description" class="product-description" placeholder="Enter product description" style="width: 100%; box-sizing: border-box;">Compatible with iPhone 13/14/15. Durable, shockproof, and stylish.</textarea>
    </section>
    <form id="checkout-form">
        <h2>Your Details</h2>
        <div class="field">
            <label for="customer-name">Full Name</label>
            <input type="text" id="customer-name" name="name" value="Ken Tester 1" required>
        </div>
        <div class="field">
            <label for="customer-email">Email</label>
            <input type="email" id="customer-email" name="email" value="ken.tester@example.com" required>
        </div>
        <div class="field-country">
            <label for="country-select">Select your country:</label>
            <select id="country-select" name="country" required>
                <option value="">-- Choose a country --</option>
                <option value="HK">Hong Kong</option>
                <option value="CN">China</option>
                <option value="US">United States</option>
                <option value="GB">United Kingdom</option>
                <option value="AU">Australia</option>
                <option value="JP">Japan</option>
                <option value="SG">Singapore</option>
                <option value="TH">Thailand</option>
                <option value="KR">South Korea</option>
                <option value="TW">Taiwan</option>
                <option value="MO">Macau</option>
                <option value="NL">Netherlands</option>
                <option value="FR">France</option>
                <option value="DE">Germany</option>
                <option value="SA">Saudi Arabia</option>
                <option value="AE">United Arab Emirates</option>
                <option value="QA">Qatar</option>
                <option value="KW">Kuwait</option>
                <option value="BH">Bahrain</option>
                <option value="OM">Oman</option>
                <option value="MX">Mexico</option>
                <option value="BR">Brazil</option>
                <option value="CL">Chile</option>
                <option value="IN">India</option>
            </select>
        </div>
        <div class="field">
            <label for="customer-address">Shipping Address</label>
            <input type="text" id="customer-address" name="address" value="123 Test Street" required>
        </div>
        <div class="field">
            <label for="customer-phone">Phone</label>
            <input type="text" id="customer-phone" name="phone" value="63659669" placeholder="e.g. 61234567" required>
        </div>
        <button type="submit" class="checkout-btn" id="checkout-hpp-btn">Checkout (HPP)</button>
        <button type="button" class="checkout-btn" id="checkout-flow-btn">Checkout (Flow)</button>
        <p class="note">You'll be redirected to a secure Checkout.com page to complete your payment.</p>
    </form>
    <div id="error-message" class="error-message"></div>
    <footer>
        <span class="security">PCI DSS Level 1 | Secure Checkout <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/00/Lock_font_awesome.svg/24px-Lock_font_awesome.svg.png" alt="Secure"></span>
        <span>&copy; Easy Checkout Demo</span>
    </footer>
</div>
<script src="phone-case-shop-app.js"></script>
</body>
</html>
